name: CI

on:
  push:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install deps (app)
        run: npm install

      - name: Start server and smoke /api/score
        run: |
          npm start &
          sleep 3
          curl -fS http://localhost:3000/api/score

  e2e:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install deps (including playwright)
        run: |
          npm install
          npx playwright install --with-deps

      - name: Start server
        run: |
          npm start &
          sleep 5

      - name: Run Playwright e2e tests
        run: |
          npx playwright test --reporter=list || true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
